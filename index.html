<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joon & Bomm | Wedding</title>

<meta name="description" content="Wedding of Joon & Bomm">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#ffffff;
    color:#111111;
    font-family:'Inter',sans-serif;
    line-height:1.7;
    overflow-x:hidden;
}

/* =========================
   TYPOGRAPHY
========================= */

h1,h2,h3{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    letter-spacing:.05em;
}

p{
    color:#555;
}

a{
    text-decoration:none;
    color:inherit;
}

/* =========================
   LAYOUT
========================= */

section{
    width:100%;
    padding:100px 24px;
}

.container{
    width:min(1100px,100%);
    margin:auto;
}

/* =========================
   BUTTON
========================= */

.button{
    display:inline-block;
    padding:15px 34px;
    border:1px solid #111;
    border-radius:999px;
    transition:.3s;
    font-size:.95rem;
    font-weight:500;
    letter-spacing:.05em;
}

.button:hover{
    background:#111;
    color:#fff;
}

/* =========================
   GOLD ACCENT
========================= */

.gold{
    color:#c6a86b;
}

/* =========================
   IMAGE
========================= */

img{
    max-width:100%;
    display:block;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

section{
    padding:72px 20px;
}

} 
/* =========================
   HERO
========================= */

.hero{
    position:relative;
    width:100%;
    height:100vh;
    min-height:720px;
    overflow:hidden;
}

.hero-image{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}

.hero-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.28);
}

.hero-content{
    position:relative;
    z-index:2;

    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    color:#fff;

    padding:24px;
}

.hero h1{
    font-size:clamp(4rem,9vw,7rem);
    line-height:1;
    font-weight:500;
    letter-spacing:.08em;
}

.hero-date{
    margin-top:28px;

    font-size:1rem;

    letter-spacing:.25em;

    color:#fff;
}

.hero-button{

    margin-top:48px;

    display:inline-block;

    padding:16px 42px;

    border:1px solid rgba(255,255,255,.85);

    border-radius:999px;

    color:#fff;

    transition:.35s;
}

.hero-button:hover{

    background:#fff;

    color:#111;

}

@media(max-width:768px){

.hero{

    min-height:680px;

}

.hero h1{

    font-size:4rem;

}

.hero-button{

    padding:14px 34px;

}

}
/* =========================
   COUNTDOWN
========================= */

.countdown{
    text-align:center;
    background:#fff;
}

.countdown h2{
    font-size:3rem;
    color:#111;
    margin-bottom:18px;
}

.countdown-subtitle{
    color:#777;
    margin-bottom:50px;
    font-size:1rem;
    letter-spacing:.08em;
}

.countdown-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    max-width:700px;
    margin:0 auto;
}

.time-box{
    padding:30px 10px;
    border:1px solid #ececec;
    border-radius:18px;
    background:#fafafa;
}

.time-box span{
    display:block;
    font-size:3rem;
    font-family:'Cormorant Garamond',serif;
    color:#111;
}

.time-box small{
    display:block;
    margin-top:10px;
    color:#777;
    letter-spacing:.12em;
    text-transform:uppercase;
}

@media(max-width:768px){

.countdown-grid{

grid-template-columns:repeat(2,1fr);

}

.countdown h2{

font-size:2.4rem;

}

.time-box span{

font-size:2.5rem;

}

}

/* =========================
   END CSS
========================= */

</style>

</head>   
<body>

<!-- HERO -->

<section class="hero">

    <div class="hero-overlay"></div>

    <img src="images/hero.jpg" alt="Joon & Bomm" class="hero-image">

    <div class="hero-content">

        <h1>
            JOON
            <br>
            &
            <br>
            BOMM
        </h1>

        <p class="hero-date">
            14 NOVEMBER 2026
        </p>

        <a href="#countdown" class="hero-button">
            Begin Our Journey
        </a>

    </div>

</section>

<!-- COUNTDOWN -->

<section id="countdown" class="countdown">

    <div class="container">

        <h2>Countdown</h2>

        <p class="countdown-subtitle">
            Until We Say "I Do"
        </p>

        <div class="countdown-grid">

            <div class="time-box">
                <span id="days">0</span>
                <small>Days</small>
            </div>

            <div class="time-box">
                <span id="hours">0</span>
                <small>Hours</small>
            </div>

            <div class="time-box">
                <span id="minutes">0</span>
                <small>Minutes</small>
            </div>

            <div class="time-box">
                <span id="seconds">0</span>
                <small>Seconds</small>
            </div>

        </div>

    </div>

</section>

<script>

const weddingDate = new Date("2026-11-14T15:09:00").getTime();

function updateCountdown(){

    const now = new Date().getTime();

    const distance = weddingDate - now;

    if(distance <= 0){

        document.getElementById("days").innerHTML = 0;
        document.getElementById("hours").innerHTML = 0;
        document.getElementById("minutes").innerHTML = 0;
        document.getElementById("seconds").innerHTML = 0;

        return;

    }

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

}

updateCountdown();

setInterval(updateCountdown,1000);

</script>
