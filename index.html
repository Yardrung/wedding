<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Joon & Bomm | Wedding</title>

<meta
name="description"
content="Wedding of Joon & Bomm">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

/* ===========================
RESET
=========================== */

*{

margin:0;

padding:0;

box-sizing:border-box;

}

html{

scroll-behavior:smooth;

}

body{

font-family:"Inter",sans-serif;

background:#fff;

color:#111;

line-height:1.8;

overflow-x:hidden;

-webkit-font-smoothing:antialiased;

}

img{

display:block;

width:100%;

height:auto;

}

a{

text-decoration:none;

color:inherit;

}

.container{

width:min(1120px,92%);

margin:auto;

}

section{

padding:110px 0;

}

/* ===========================
TYPOGRAPHY
=========================== */

h1,
h2,
h3{

font-family:
"Cormorant Garamond",
serif;

font-weight:500;

letter-spacing:.05em;

color:#111;

}

h2{

font-size:3rem;

margin-bottom:18px;

text-align:center;

}

p{

color:#666;

}

.section-title{

text-align:center;

margin-bottom:18px;

letter-spacing:.28em;

font-size:.8rem;

font-weight:600;

color:#B89A5A;

text-transform:uppercase;

}

.divider{

width:70px;

height:1px;

background:#d8d8d8;

margin:22px auto 60px;

}
/* ===========================
HERO
=========================== */

.hero{

position:relative;

width:100%;

height:100vh;

min-height:760px;

overflow:hidden;

}

.hero-image{

position:absolute;

inset:0;

width:100%;

height:100%;

object-fit:cover;

object-position:center;

}

.hero-overlay{

position:absolute;

inset:0;

background:linear-gradient(
to bottom,
rgba(0,0,0,.12),
rgba(0,0,0,.38)
);

z-index:1;

}

.hero-content{

position:relative;

z-index:2;

height:100%;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:24px;

color:#fff;

animation:heroFade 1.2s ease;

}

.hero h1{

font-size:clamp(4rem,10vw,7.5rem);

line-height:.95;

letter-spacing:.12em;

color:#fff;

}

.hero-date{

margin-top:28px;

font-size:1rem;

letter-spacing:.35em;

text-transform:uppercase;

color:rgba(255,255,255,.92);

}

.hero-tagline{

margin-top:20px;

font-family:
"Cormorant Garamond",
serif;

font-style:italic;

font-size:1.45rem;

font-weight:400;

color:rgba(255,255,255,.88);

}

.scroll-down{

margin-top:60px;

font-size:2.3rem;

font-weight:300;

color:#fff;

animation:bounce 2s infinite;

}

@keyframes heroFade{

from{

opacity:0;

transform:translateY(28px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes bounce{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(10px);

}

}

@media(max-width:768px){

.hero{

min-height:680px;

}

.hero h1{

font-size:4.3rem;

}

.hero-date{

letter-spacing:.22em;

font-size:.9rem;

}

.hero-tagline{

font-size:1.2rem;

}

.scroll-down{

font-size:2rem;

margin-top:48px;

}

}
/* ===========================
BUTTON
=========================== */

.hero-button{

display:inline-flex;

align-items:center;

justify-content:center;

margin-top:42px;

padding:16px 40px;

border:1px solid rgba(255,255,255,.9);

border-radius:999px;

background:transparent;

color:#fff;

font-size:.95rem;

font-weight:500;

letter-spacing:.08em;

transition:.35s;

}

.hero-button:hover{

background:#fff;

color:#111;

transform:translateY(-2px);

}

</style>

</head>

<body>

<section class="hero">

<img
src="images/hero.jpg"
alt="Joon & Bomm"
class="hero-image">

<div class="hero-overlay"></div>

<div class="hero-content">

<h1>

JOON

<br>

&

<br>

BOMM

</h1>

<p class="hero-date">

14 NOVEMBER 2026

</p>

<p class="hero-tagline">

A Celebration of Love

</p>

<a
href="#countdown"
class="hero-button">

Begin Our Journey

</a>

<div class="scroll-down">

↓

</div>

</div>

</section>
